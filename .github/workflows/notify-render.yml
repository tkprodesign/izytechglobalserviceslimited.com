name: Notify — Render Backend Deploy

# Runs on every push to main — polls Render API until the deploy
# finishes (or times out after 10 minutes), then fires an ntfy push.
on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Render deploy & notify
        env:
          RENDER_API_KEY:    ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: srv-d9hd617avr4c73ebtj9g
        run: |
          echo "Waiting for Render deploy to start…"
          sleep 20   # give Render ~20 s to register the new deploy

          MAX_WAIT=600   # 10 minutes
          ELAPSED=0
          INTERVAL=15
          STATUS=""
          DEPLOY_ID=""

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            RESPONSE=$(curl -s \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              -H "Accept: application/json" \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys?limit=1")

            # Extract status of the most recent deploy
            STATUS=$(echo "$RESPONSE" | grep -o '"status":"[^"]*"' | head -1 | cut -d'"' -f4)
            DEPLOY_ID=$(echo "$RESPONSE" | grep -o '"id":"dep-[^"]*"' | head -1 | cut -d'"' -f4)

            echo "Deploy $DEPLOY_ID — status: $STATUS (${ELAPSED}s elapsed)"

            if [ "$STATUS" = "live" ]; then
              curl -s -o /dev/null \
                -H "Title: ✅ Render backend live" \
                -H "Priority: default" \
                -H "Tags: white_check_mark,satellite" \
                -H "Click: https://izytech-api.onrender.com/api/health" \
                -d "Deploy $DEPLOY_ID is live — backend is up." \
                https://ntfy.sh/TKProRocketGuild
              exit 0
            elif [ "$STATUS" = "build_failed" ] || [ "$STATUS" = "deactivated" ] || [ "$STATUS" = "canceled" ]; then
              curl -s -o /dev/null \
                -H "Title: ❌ Render deploy FAILED" \
                -H "Priority: high" \
                -H "Tags: x,warning" \
                -H "Click: https://dashboard.render.com/web/$RENDER_SERVICE_ID/deploys" \
                -d "Deploy $DEPLOY_ID — status: $STATUS" \
                https://ntfy.sh/TKProRocketGuild
              exit 1
            fi

            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          # Timeout
          curl -s -o /dev/null \
            -H "Title: ⏱️ Render deploy timed out" \
            -H "Priority: default" \
            -H "Tags: hourglass_done" \
            -H "Click: https://dashboard.render.com/web/$RENDER_SERVICE_ID/deploys" \
            -d "Could not confirm deploy status after 10 minutes. Check Render dashboard." \
            https://ntfy.sh/TKProRocketGuild
