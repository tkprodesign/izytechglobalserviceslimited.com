name: Notify — Render Backend Deploy

# Runs on every push to main.
# Checks whether Render started a NEW deploy (within the last 3 minutes).
# If yes, polls until it finishes and sends an ntfy notification.
# If no new deploy is found, it skips silently — Render may not be
# set to auto-deploy from GitHub; manual/API-triggered deploys are
# still caught if they happen to coincide.
on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Render deploy & notify
        env:
          RENDER_API_KEY:    ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: srv-d9hd617avr4c73ebtj9g
        run: |
          echo "Waiting 30s for Render to register a new deploy…"
          sleep 30

          # Fetch latest deploy
          RESPONSE=$(curl -sf \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys?limit=1")

          echo "API response: $RESPONSE"

          # Parse fields using Python for reliability (no grep quoting issues)
          STATUS=$(echo "$RESPONSE" | python3 -c "
import sys, json
data = json.load(sys.stdin)
if data and isinstance(data, list):
    print(data[0]['deploy']['status'])
" 2>/dev/null)

          CREATED_AT=$(echo "$RESPONSE" | python3 -c "
import sys, json
data = json.load(sys.stdin)
if data and isinstance(data, list):
    print(data[0]['deploy']['createdAt'])
" 2>/dev/null)

          DEPLOY_ID=$(echo "$RESPONSE" | python3 -c "
import sys, json
data = json.load(sys.stdin)
if data and isinstance(data, list):
    print(data[0]['deploy']['id'])
" 2>/dev/null)

          echo "Latest deploy: $DEPLOY_ID | status: $STATUS | created: $CREATED_AT"

          # Check if deploy was created in the last 5 minutes (recent = triggered by this push)
          DEPLOY_EPOCH=$(date -d "$CREATED_AT" +%s 2>/dev/null || python3 -c "
from datetime import datetime, timezone
dt = datetime.fromisoformat('$CREATED_AT'.replace('Z','+00:00'))
print(int(dt.timestamp()))
")
          NOW_EPOCH=$(date +%s)
          AGE=$((NOW_EPOCH - DEPLOY_EPOCH))
          echo "Deploy age: ${AGE}s"

          if [ "$AGE" -gt 300 ]; then
            echo "No recent Render deploy found (latest is ${AGE}s old). Skipping."
            exit 0
          fi

          # A recent deploy exists — poll until it finishes
          MAX_WAIT=600
          ELAPSED=0
          INTERVAL=15

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            RESPONSE=$(curl -sf \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              -H "Accept: application/json" \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys?limit=1")

            STATUS=$(echo "$RESPONSE" | python3 -c "
import sys, json
data = json.load(sys.stdin)
if data:
    print(data[0]['deploy']['status'])
" 2>/dev/null)

            echo "Status: $STATUS (${ELAPSED}s elapsed)"

            if [ "$STATUS" = "live" ]; then
              curl -s -o /dev/null \
                -H "Title: ✅ Render backend live" \
                -H "Priority: default" \
                -H "Tags: white_check_mark,satellite" \
                -H "Click: https://izytech-api.onrender.com/api/health" \
                -d "Deploy $DEPLOY_ID is live — backend is up and healthy." \
                https://ntfy.sh/TKProRocketGuild
              exit 0
            elif [ "$STATUS" = "build_failed" ] || [ "$STATUS" = "deactivated" ] || [ "$STATUS" = "canceled" ]; then
              curl -s -o /dev/null \
                -H "Title: ❌ Render deploy FAILED" \
                -H "Priority: high" \
                -H "Tags: x,warning" \
                -H "Click: https://dashboard.render.com/web/$RENDER_SERVICE_ID/deploys" \
                -d "Deploy $DEPLOY_ID — status: $STATUS. Check Render dashboard." \
                https://ntfy.sh/TKProRocketGuild
              exit 1
            fi

            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          # Timeout — a recent deploy was found but didn't finish in time
          curl -s -o /dev/null \
            -H "Title: ⏱️ Render deploy taking long" \
            -H "Priority: default" \
            -H "Tags: hourglass_done" \
            -H "Click: https://dashboard.render.com/web/$RENDER_SERVICE_ID/deploys" \
            -d "Deploy $DEPLOY_ID hasn't confirmed live after 10 min. Check Render dashboard." \
            https://ntfy.sh/TKProRocketGuild
